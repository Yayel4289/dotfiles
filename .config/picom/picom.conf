backend = "glx";

blur-method = "dual_kawase";
blur-strength = 3; 
blur-passes = 1;   

blur-background = true;
blur-background-frame = true;

blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'"
];

#shadow = true;
#shadow-radius = 12;
#shadow-opacity = 0.7;

wintypes:
{
    normal = { };
    dialog = { };
    utility = { };
    tooltip = { };
    dock = { };
    dropdown_menu = { };
    popup_menu = { };
    splash = { };
    notification = { };
    combo = { };
    dnd = { };
    menu = { };
    # For Visual Paradigm
    unknown = { blur-background = false; shadow = false; opacity = 1.0; };
};

