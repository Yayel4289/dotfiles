# Prompt

[character]
success_symbol = "[ ‚ĚĮ](red)"
error_symbol = "[ś≠Ľ](red)"

[fill]
symbol = " "

[directory]
style = "fg:text bg:dark_red"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"documents" = "ůįąô "
"downloads" = "ÔÄô "
"images" = "ÔÄĺ "
