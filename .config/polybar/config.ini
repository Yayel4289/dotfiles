[colors]
#background = #282A2E
background = #150000
#background-alt = #373B41
background-alt = #230000
#foreground = #C5C8C6
foreground = #BB5500
highlight-fg = #EE7700
#primary = #F0C674
primary = #900000
secondary = #8ABEB7
alert = #A54242
#disabled = #707880
disabled = #660000

[bar/main]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.primary}

; normal
font-0 = Fira Code:style=Regular:pixelsize=13
; glyphs
font-1 = FiraCode Nerd Font Mono:style=Regular:pixelsize=20
; kanji
font-2 = Noto Sans CJK JP:style=Regular:pixelsize=13

modules-left = xworkspaces xwindow
modules-right = battery wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground = ${colors.highlight-fg}
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{Fprimary}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}


#[module/pulseaudio]
#type = internal/pulseaudio
#
#format-volume-prefix = "VOL "
#format-volume-prefix-foreground = ${colors.primary}
#format-volume = <label-volume>
#
#label-volume = %percentage%%
#
#label-muted = muted
#label-muted-foreground = ${colors.disabled}

#[module/xkeyboard]
#type = internal/xkeyboard
#blacklist-0 = num lock
#
#label-layout = %layout%
#label-layout-foreground = ${colors.primary}
#
#label-indicator-padding = 2
#label-indicator-margin = 1
#label-indicator-foreground = ${colors.background}
#label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-foreground = ${colors.foreground}
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = ůį§• %essid%
label-disconnected = ůį§ģ

[module/eth]
inherit = network-base
interface-type = wired
label-connected = ÓľČ

; Module battery
[module/battery]
type = internal/battery
battery = BAT0 
full-at = 98
label-foreground = ${colors.foreground}
label-charging = "ÔÉß %percentage%%"
label-discharging = "ÔČĀ %percentage%%"
label-full = "ÔČÄ 100%"

; Module volume
[module/volume]
type = internal/volume
format-muted = "ÔÄ¶ muted"
format-volume = "ÔÄ® %percentage%%"

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
date-foreground = ${colors.foreground}

#label = %date%
#label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
